name: release-debug

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  goreleaser-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean

      - name: Smoke install packages
        run: bash scripts/smoke-packages dist

      - name: Upload snapshot assets
        uses: actions/upload-artifact@v4
        with:
          name: config-snapshot-assets
          path: |
            dist/*.tar.gz
            dist/*.apk
            dist/*.deb
            dist/*.rpm
            dist/checksums.txt
            dist/artifacts.json
            dist/metadata.json
          retention-days: 14
