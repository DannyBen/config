## Core

build: go build -ldflags "-X main.Version=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" -o config .
#? build the binary

config: go run . "$@"
#? run the CLI without building

run: go run . "$@"
#? run the CLI without building

## Testing & Linting

test: go test ./... "$@"
#? run tests

acceptance: go test ./cmd -run TestFeatures -args "$@"
#? run feature acceptance tests
#? you can provide a partial path like 'get/refusals' to run a single test

coverage: go test ./cmd ./format ./format/tomldoc ./help ./internal/reporter -cover
#? run tests with coverage

fmt: gofmt -w .
#? format code

vet: go vet ./...
#? check for suspicious code patterns and likely mistakes

maintainability: scripts/maintainability
#? report maintainability hotspots without blocking the main check

check:
  gofmt -w .
  go vet ./...
  go test ./...
  scripts/maintainability
#? format, vet, and test everything

## Dependencies

tidy: go mod tidy
#? clean up and sync dependencies

verify: go mod verify
#? verify dependencies match checksums

## Completions

comp-install: config completion bash > ~/.local/share/bash-completion/completions/config
